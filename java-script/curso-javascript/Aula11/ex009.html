<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pais</title>
</head>
<body>
    <h1>Nacionalidade</h1>
    <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Pesquisar" onclick="pesquisar()">
    <div id="res">

    </div>
    <script>
        function pesquisar() {
            var txtp = document.querySelector('input#txtpais')
            var res = document.querySelector('div#res')
            var pais = txtp.value
            res.innerHTML = `<p>Você nasceu no(a) <strong>${pais}</strong></p>`
            if (pais == 'Brasil') {
                res.innerHTML += `<p>Você é <strong>BRASILEIRO</strong></p>`
            } else {
                res.innerHTML += `<p>Você é <strong>ESTRANGEIRO</strong></p>`
            }
        }
    </script>
</body>
</html>
