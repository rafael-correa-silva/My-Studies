<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            color: blue;
            font: normal 40px Arial, sans-serif;
        }
    </style>
</head>
<body>
    
    <script>
        var nome = prompt("Digite seu nome:"); // Vai perguntar o nome do usuário
        document.write(`Seu nome tem ${nome.length} letras.`); // Escreve diretamente na página
        document.writeln(`<br>Seu nome em maiúsculas é ${nome.toUpperCase()}.`); // Escreve o nome em maiúsculas
        document.writeln(`<br>Seu nome em minúsculas é ${nome.toLowerCase()}.`); // Escreve o nome em minúsculas



        /*
        Operadores aritméticos:
        + Adição
        - Subtração
        * Multiplicação
        / Divisão
        % Resto da divisão
        ++ Incremento
        -- Decremento
        
        Operadores de comparação:
        == Igual a
        != Diferente de
        > Maior que
        < Menor que
        >= Maior ou igual a
        <= Menor ou igual a

        Operadores lógicos:
        && E lógico - Retorna true se ambos os operandos forem verdadeiros
        || Ou lógico - Retorna true se pelo menos um dos operandos for verdadeiro
        ! Negação lógica - Retorna true se o operando for falso e vice-versa
 
        
        
        
        */
    </script>
</body>
</html>
