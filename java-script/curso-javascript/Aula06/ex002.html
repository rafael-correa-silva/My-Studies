<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        body {
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Já me livrei da maldição!!</p>
    <script>
        var nome = prompt("Digite seu nome:"); // Vai perguntar o nome do usuário
        alert("Olá, " + nome + "!");
        console.log("Nome do usuário:",  + nome + '!'); // Vai mostrar o nome no console
 
    </script>
</body>
</html>
