<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="iusu">*Nome:</label>
            <input type="text" name="usu" id="iusu" required minlength="1" maxlength="15" placeholder="Nome" autocomplete="name">
        </p>
        <p>
            <label for="imedia">*Média:</label>
            <input type="number" name="media" id="imedia" required min="0" max="4" placeholder="Média" autocomplete="off" step="0.1">
            </label>
        </p>
        <p>
            <label for="imes">*Mês:</label>
            <input type="month" name="mes" id="imes" required autocomplete="off" value="2026-04">
        </p>
        <p>
            <label for="idia">*Dia:</label>
            <input type="date" name="dia" id="idia" required autocomplete="off">
        </p>
        <p>
            <label for="ihora">*Hora:</label>
            <input type="time" name="hora" id="ihora" required autocomplete="off">
        </label>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar"> 
        </p>
    </form>
    
</body>
</html>
