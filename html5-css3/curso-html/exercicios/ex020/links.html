<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*  Seletores Pesonalizados
            # = id
            . = class
            : = pseudo-classe
            :: = pseudo-elemento
            > = children
       
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: blueviolet;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: red;
        }

        a:hover {
            text-decoration: underline;
            color: black;
        }

        .especial {
            background-color: rgb(250, 168, 168);
        }

        a:active {
            color: green;
        }

        .especial::before {
            content: '→ ';
        }

        .especial::after {
            content: ' ←'
        }
    </style>
</head>
<body>
    <h1>Pesonalizando Links</h1>
    <ul>
        <li><a href="https://github.com/Rafa-code0" target="_blank">Meu GitHub</a></li>
        <li><a href="https://www.instagram.com/rafael_coorreea/" class="especial" target="_blank">Meu Instagram</a></li>
        <li><a href="https://www.linkedin.com/in/rafael-correa-silva/" target="_blank">Meu LinkedIn</a></li>
    </ul>
    
</body>
</html>
