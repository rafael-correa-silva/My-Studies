<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url(fonts/love\ larry\ ttf.ttf);
            font-weight: normal;
            font-style: normal;
            

            /*
            Tupos de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded opentype (eot)
            -truetype-aat (Apple Advanced Typography)
            - svg (Scalable Vector Graphics)       
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            color: black;
        }

        h1 {
            font-family: 'love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }

    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ea veniam commodi rerum odio saepe corrupti voluptatibus quis placeat aliquid voluptates tempora quam iure quidem, totam porro odit delectus alias sed?</p>
    
</body>
</html>
