<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1  { /* Box-Level*/
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: lightgray;
            height: 300px;
            width: 300px;

            /*
            border-width: 10px;
            border-style: solid;
            border-color: black;
            */

            border: 10px solid black;

            /*
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            */

            /*
            padding: 10px 10px 10px 10px;
            padding: 10px 20px;
            */

            padding: 10px;

            /*
            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;
            */

            margin: 20px auto 40px auto;

            /*
            outline-width: 10px;
            outline-style: solid;
            outline-color: red;
            */

            outline: 10px solid red;

        }

        a { /* In-Level*/
            /*
            border-width: 3px;
            border-style: solid;
            border-color: black;
            */

            border: 3px solid black;
            color: blueviolet;

            /*
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            */

            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa Box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href=""> links</a> são exemplos de ciaxas inline-level. Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
